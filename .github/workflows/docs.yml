# Generate HTML documentation with pdoc and deploy to GitHub Pages.
# Runs on every push to main and on PRs targeting main (build-only for PRs).

name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress deployments when a newer push arrives.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[viz]"
          python -m pip install pdoc

      - name: Generate HTML documentation
        run: pdoc embryobiopsy3d --output-dir docs/_build/html

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build-docs
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
